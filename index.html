<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='styles.css'>
    <title>Sign-Up Form</title>
</head>
<body>
    <div class='logo-graphic'>
        <div class='logo'>
            <img id='logo-image' src='images/BNK_logo.png' alt='BNK Logo'/>
            <h1>Ben Noetzel-Kiers</h1>
        </div>
    </div>
    <div class='form-container'>
        <div class='form-intro'>
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <form action='' method='post'>
            <fieldset>
                <p>Let's do this!</p>
                <div>
                    <label for='first_name'>FIRST NAME</label>
                    <input type='text' id='first_name' name='first_name'>
                </div>
                <div>
                    <label for='last_name'>LAST NAME</label>
                    <input type='text' id='last_name' name='last_name'>
                </div>
                <div>
                    <label for='user_email'>EMAIL</label>
                    <input type='email' id='user_email' name='user_email'>
                </div>
                <div>
                    <label for='user_phone'>PHONE NUMBER</label>
                    <input type='tel' id='user_phone' name='user_phone'>
                </div>
                <div>
                    <label for='pswd'>PASSWORD</label>
                    <input type='password' id='pswd' name='pswd'>
                </div>
                <div>
                    <label for='cnfm_pswd'>CONFIRM PASSWORD</label>
                    <input type='password' id='cnfm_pswd' name='cnfm_pswd'>
                </div>
            </fieldset>
            <button type='submit'>Create Account</button>

        </form>
        <p>Already have an account? <a href=''>Log in</a></p>
    </div>
</body>
</html>
